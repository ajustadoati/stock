openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Inventory management API for doors and windows company
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: categories
    description: Product categories
  - name: products
    description: Inventory products
  - name: movements
    description: Stock movements (in/out)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryInput"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    put:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryInput"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductInput"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /movements:
    get:
      operationId: listMovements
      tags: [movements]
      summary: List all movements
      parameters:
        - name: productId
          in: query
          required: false
          schema:
            type: integer
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [entrada, salida]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of movements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Movement"
    post:
      operationId: createMovement
      tags: [movements]
      summary: Register a stock movement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMovementInput"
      responses:
        "201":
          description: Created movement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movement"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [products]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List all production templates
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Template"
    post:
      operationId: createTemplate
      tags: [templates]
      summary: Create a production template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTemplateInput"
      responses:
        "201":
          description: Created template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"

  /templates/{id}:
    get:
      operationId: getTemplate
      tags: [templates]
      summary: Get a template by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Template with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
    put:
      operationId: updateTemplate
      tags: [templates]
      summary: Update a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTemplateInput"
      responses:
        "200":
          description: Updated template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
    delete:
      operationId: deleteTemplate
      tags: [templates]
      summary: Delete a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /templates/{id}/produce:
    post:
      operationId: produceTemplate
      tags: [templates]
      summary: Register production of units using a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProduceTemplateInput"
      responses:
        "201":
          description: Production recorded with all movements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProduceTemplateResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        color:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - color
        - createdAt

    CreateCategoryInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        color:
          type: string
      required:
        - name
        - color

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        categoryId:
          type: integer
        categoryName:
          type: string
        categoryColor:
          type: string
        unit:
          type: string
        currentStock:
          type: number
        minimumStock:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - categoryId
        - categoryName
        - categoryColor
        - unit
        - currentStock
        - minimumStock
        - createdAt

    CreateProductInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        categoryId:
          type: integer
        unit:
          type: string
        currentStock:
          type: number
        minimumStock:
          type: number
      required:
        - name
        - categoryId
        - unit
        - currentStock
        - minimumStock

    Movement:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        categoryName:
          type: string
        type:
          type: string
          enum: [entrada, salida]
        quantity:
          type: number
        notes:
          type: string
          nullable: true
        stockBefore:
          type: number
        stockAfter:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - productId
        - productName
        - categoryName
        - type
        - quantity
        - stockBefore
        - stockAfter
        - createdAt

    CreateMovementInput:
      type: object
      properties:
        productId:
          type: integer
        type:
          type: string
          enum: [entrada, salida]
        quantity:
          type: number
        notes:
          type: string
          nullable: true
      required:
        - productId
        - type
        - quantity

    DashboardSummary:
      type: object
      properties:
        totalProducts:
          type: integer
        totalCategories:
          type: integer
        lowStockProducts:
          type: integer
        recentMovements:
          type: array
          items:
            $ref: "#/components/schemas/Movement"
        totalEntradasHoy:
          type: integer
        totalSalidasHoy:
          type: integer
      required:
        - totalProducts
        - totalCategories
        - lowStockProducts
        - recentMovements
        - totalEntradasHoy
        - totalSalidasHoy

    DeleteResult:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    TemplateItem:
      type: object
      properties:
        id:
          type: integer
        templateId:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        categoryName:
          type: string
        unit:
          type: string
        quantity:
          type: number
        notes:
          type: string
          nullable: true
      required:
        - id
        - templateId
        - productId
        - productName
        - categoryName
        - unit
        - quantity

    TemplateItemInput:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: number
        notes:
          type: string
          nullable: true
      required:
        - productId
        - quantity

    Template:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [puerta, ventana, otro]
        description:
          type: string
          nullable: true
        width:
          type: number
          nullable: true
        height:
          type: number
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/TemplateItem"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - type
        - items
        - createdAt

    CreateTemplateInput:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [puerta, ventana, otro]
        description:
          type: string
          nullable: true
        width:
          type: number
          nullable: true
        height:
          type: number
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/TemplateItemInput"
      required:
        - name
        - type
        - items

    ProduceTemplateInput:
      type: object
      properties:
        quantity:
          type: number
        notes:
          type: string
          nullable: true
      required:
        - quantity

    ProduceTemplateResult:
      type: object
      properties:
        success:
          type: boolean
        templateName:
          type: string
        unitsProduced:
          type: number
        movements:
          type: array
          items:
            $ref: "#/components/schemas/Movement"
        insufficientStock:
          type: array
          items:
            type: object
            properties:
              productName:
                type: string
              required:
                type: number
              available:
                type: number
            required:
              - productName
              - required
              - available
      required:
        - success
        - templateName
        - unitsProduced
        - movements
        - insufficientStock
